# Please note not all available settings / options are set here.

# For a full list, see the wiki
#

#autogenerated = 1 # remove this line to remove the warning


# See https://wiki.hyprland.org/Configuring/Monitors/
monitor = HDMI-A-2, 2560x1440@144, 1280x0, 1
monitor = DP-1, 2560x1600@59.997, 0x745, 1.25
monitor = DP-2, 2560x1600@59.997, 0x745, 1.25


# See https://wiki.hyprland.org/Configuring/Keywords/ for more

# Set programs that you use
$terminal = kitty
$fileManager = dolphin
# $menu = wofi -show run,drun --style ~/.config/wofi/style.css --conf ~/.config/wofi/config
$menu = rofi -show drun -show-icons -theme ~/.config/rofi/colors/catppuccin.rasi
$browser = firefox

# Execute your favorite apps at launch
 exec-once=dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP GTK_THEME QT_QPA_PLATFORMTHEME
 exec-once = quickshell
 exec-once = bitwarden-desktop
 exec-once = steam -silent
 exec-once = solaar -w hide
 exec-once = nm-applet
 exec-once = hyprpaper --daemon
 exec-once = eww daemon
 exec-once = waybar

# Standard Apps
 exec-once = hyprctl dispatch exec [workspace 1 silent] $browser https://outlook.office.com
 exec-once = hyprctl dispatch exec [workspace 2 silent] vesktop
 exec-once = hyprctl dispatch exec [workspace 3 silent] $browser https://teams.microsoft.com
 exec-once = hyprctl dispatch exec [workspace 4 silent] Cider.AppImage
 exec-once = hyprctl dispatch exec [workspace 5 silent] kitty

# Source a file (multi-file configs)
# source = ~/.config/hypr/myColors.conf

# Some default env vars.
env = XCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME,kvantum
env = GTK_THEME,Arc-Dark

# For all categories, see https://wiki.hyprland.org/Configuring/Variables/
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    touchpad {
        natural_scroll = no
    }

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
}

general {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    gaps_in = 5
    gaps_out = 5
    border_size = 2
    col.active_border = rgba(33ccffee) rgba(ff00ffee) 45deg
    col.inactive_border = rgba(595959aa)

    layout = dwindle

    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = false
}

decoration {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    rounding = 2

    blur {
        enabled = true
        size = 4 
        passes = 4
        popups = true
        ignore_opacity = true
        noise = 0
        contrast = 0.9
        brightness = 1.02
        vibrancy = 0.15
        vibrancy_darkness = 0.3
    }

    active_opacity = .8
    inactive_opacity = .8
    fullscreen_opacity = .8

    shadow {
        enabled = yes
        range = 10
        render_power = 2
    }
}

animations {
    enabled = true

    # Some default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 3, myBezier, slide
    animation = windowsOut, 1, 3, myBezier, slide
    animation = border, 0
    animation = borderangle, 0
    animation = fade, 1, 3, default
    animation = workspaces, 1, 3, default
    # animation = hyprfocusIn, 1, 1.7, myBezier
    # animation = hyprfocusOut, 1, 1.7, myBezier
}

plugin {
    hyprwinwrap {
        class = mpv
    }
}
dwindle {
    # See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
    pseudotile = yes # master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = yes # you probably want this
}

master {
    # See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
    new_status = slave
}

misc {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    force_default_wallpaper = 0 # Set to 0 to disable the anime mascot wallpapers
}

windowrule = float on, match:class ^(wallpaper-picker)$
windowrule = size (monitor_w/2) (monitor_h/3), match:class ^(wallpaper-picker)$
windowrule = center on, match:class ^(wallpaper-picker)$
windowrule = float on, match:class ^(screenkey)$
windowrule = float on, match:class ^(com.gabm.satty)$
windowrule = float on, match:class ^(Rofi)$
windowrule = float on, match:class ^(Bitwarden)$
windowrule = float on, match:title ^(Bitwarden)$
windowrule = float on, match:title ^(LocalSend)$
windowrule = opacity 1 override 1 override, match:initial_class ^(steam.*)$
windowrule = opacity 1 override 1 override, match:class ^(Terraria.*)$
windowrule = opacity 1 override 1 override, match:class ^(mpv)$
windowrule = workspace 2, match:class ^(discord)$
windowrule = tile on, match:initial_title ^(.*Outlook.*)$
windowrule = tile on, match:initial_title ^(.*Teams.*)$

layerrule = blur on, match:namespace notifications
layerrule = ignore_alpha 0.2, match:namespace notifications
layerrule = ignore_alpha 0, match:namespace waybar
layerrule = blur on, match:namespace waybar
layerrule = blur on, match:namespace rofi
layerrule = ignore_alpha 0, match:namespace rofi

# Ironbar blur rules
layerrule = blur on, match:namespace ironbar
layerrule = ignore_alpha 0.3, match:namespace ironbar

# EWW popup blur rules
layerrule = blur on, match:namespace eww-popup
layerrule = ignore_alpha 0.2, match:namespace eww-popup



# See https://wiki.hyprland.org/Configuring/Keywords/ for more
$mainMod = SUPER

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, T, exec, $terminal
bind = $mainMod, R, exec, $browser
bind = $mainMod, Q, killactive,
bind = $mainMod, F, fullscreen,
bind = $mainMod, M, exit,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, S, swapsplit
bind = $mainMod, V, togglefloating
bind = $mainMod, K, pin
bind = $mainMod, Space, exec, $menu
bind = $mainMod CTRL, L, exec, playerctl -p cider next
bind = $mainMod CTRL, H, exec, playerctl -p cider previous
bind = $mainMod CTRL, P, exec, playerctl -p cider play-pause
# bind = $mainMod CTRL, M, exec, ~/.config/hypr/scripts/volume mute
bind = $mainMod CTRL, J, exec, ~/.config/hypr/scripts/volume down
bind = $mainMod CTRL, K, exec, ~/.config/hypr/scripts/volume up
bind = $mainMod CTRL, S, exec, hyprshot -m ${1:-region} --raw | satty --filename - --copy-command wl-copy --early-exit --actions-on-escape save-to-clipboard --actions-on-enter save-to-clipboard --output-filename "${HOME}/Pictures/screenshot-$(date +'%Y-%m-%d_%H-%M-%S').png"
bind = $mainMod CTRL, F, exec, grim - | wl-copy && notify-send "Screenshot copied to clipboard"
bind = $mainMod CTRL, T, exec, ~/.config/hypr/hypr_opacity_toggle.sh && dunstify "Opacity toggled"
bind = $mainMod CTRL, D, exec, typeset -A map=(ON 100 OFF 0); curr=$(dunstctl get-pause-level); new=$((curr == ${map[OFF]} ? ${map[ON]} : ${map[OFF]})); { sleep 0.3; dunstctl set-pause-level $new; } &
# Mute microphone
bind = $mainMod CTRL, M, exec, pactl set-source-mute @DEFAULT_SOURCE@ toggle && notify-send --app-name="Hyprland" "Microphone toggled"
# Mute quickshell notifications
bind = $mainMod CTRL, N, exec, echo "toggle-dnd" | socat - UNIX-CONNECT:$XDG_RUNTIME_DIR/quickshell.sock
# Mute video using camblock
bind = $mainMod CTRL, C, exec, camblock && notify-send --app-name="Hyprland" "Camera toggled"
# Toggle voice assistant
bind = $mainMod CTRL, V, exec, $HOME/code/home/todo/scripts/voice-assistant.sh toggle
# Wallpaper picker
bind = $mainMod CTRL, W, exec, kitty --class wallpaper-picker -e zsh -ic wallpaper

# Monitor Input source switching
bind = $mainMod CTRL, 1, exec, ~/.config/hypr/scripts/monitor.py -d 1 -s hdmi1
bind = $mainMod CTRL, 2, exec, ~/.config/hypr/scripts/monitor.py -d 1 -s dp1
bind = $mainMod CTRL, 3, exec, ~/.config/hypr/scripts/monitor.py -d 1 -s hdmi2
bind = $mainMod CTRL, 4, exec, ~/.config/hypr/scripts/monitor.py -d 1 -s dp2

# Move focus with mainMod + arrow keys
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# Move windows on screen
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d

# Resize current window
bind = CTRL ALT, h, resizeactive, -50 0
bind = CTRL ALT, l, resizeactive, 50 0
bind = CTRL ALT, k, resizeactive, 0 -50
bind = CTRL ALT, j, resizeactive, 0 50

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspacesilent, 1
bind = $mainMod SHIFT, 2, movetoworkspacesilent, 2
bind = $mainMod SHIFT, 3, movetoworkspacesilent, 3
bind = $mainMod SHIFT, 4, movetoworkspacesilent, 4
bind = $mainMod SHIFT, 5, movetoworkspacesilent, 5
bind = $mainMod SHIFT, 6, movetoworkspacesilent, 6
bind = $mainMod SHIFT, 7, movetoworkspacesilent, 7
bind = $mainMod SHIFT, 8, movetoworkspacesilent, 8
bind = $mainMod SHIFT, 9, movetoworkspacesilent, 9
bind = $mainMod SHIFT, 0, movetoworkspacesilent, 10

# Example special workspace (scratchpad)
# bind = $mainMod, S, togglespecialworkspace, magic
# bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
